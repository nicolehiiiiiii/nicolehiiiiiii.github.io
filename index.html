<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Info Table</title>
<style>
  /* The borders to collapse into one border. */
  table {
    border-collapse: collapse;
  }
  
  /* 為表格與儲存格加上邊框，以便看出折疊效果 */
  table, th, td {
    border: 1px solid black;
  }

  /* th, td padding 5px. 及 Text aligns to left. */
  th, td {
    padding: 5px;
    text-align: left;
  }
</style>
</head>
<body>

<table>
  <tr>
    <th>Name</th>
    <th>Student ID</th>
  </tr>
  <tr>
    <td>羅乃慈</td>
    <td>113403533</td>
  </tr>
</table>

</body>
</html>
